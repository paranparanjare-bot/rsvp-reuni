<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Hadir Reuni</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 700px; margin: auto; background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-container { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; gap: 15px; }
        .logo { width: 70px; height: auto; object-fit: contain; }
        .header-text { text-align: left; }
        .header-text h2 { color: #2c3e50; margin: 0 0 5px 0; font-size: 22px; }
        .header-text .subtitle { color: #7f8c8d; margin: 0; font-size: 14px; }
        .contact-box { text-align: center; background-color: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #555; border: 1px dashed #ccc; }
        .wa-link { color: #25D366; text-decoration: none; font-weight: bold; padding: 2px 6px; background-color: #e8fbf0; border-radius: 4px; }
        .wa-link:hover { background-color: #d1f4e0; }
        .text-center { text-align: center; }
        .info-box { background-color: #e8f4fd; border-left: 4px solid #3498db; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 10px; text-align: left; }
        th { background-color: #3498db; color: white; border-bottom: none; }
        tr:hover { background-color: #f9f9f9; }
        td.text-center { text-align: center; }

        /* Tombol Delete */
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-delete:hover { background-color: #c0392b; }

        /* Gaya Rekap Kaos (Dipindah ke bawah) */
        .rekap-kaos { background-color: white; padding: 15px; border-radius: 6px; margin-top: 30px; border: 1px solid #bce8f1; color: #2c3e50; }
        .rekap-title { font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .rekap-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .rekap-item { background-color: #ecf0f1; padding: 6px 12px; border-radius: 6px; font-size: 13px; border: 1px solid #bdc3c7; }
        .rekap-item strong { color: #e74c3c; font-size: 15px; margin-left: 5px; }

        @media (max-width: 480px) {
            .header-container { flex-direction: column; text-align: center; }
            .header-text { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-container">
            <img src="logo.jpg" alt="Logo Reuni" class="logo">
            <div class="header-text">
                <h2>Konfirmasi Hadir Reuni</h2>
                <h2>SMPN 1 Banyuwangi</h2>
                <p class="subtitle">Kecaruk Riko Maning Dulur</p>
            </div>
        </div>

        <div class="contact-box">
            Konfirmasi hadir : <br>
            Anisah <a href="https://wa.me/628124861790" target="_blank" class="wa-link">08124861790</a> &nbsp;|&nbsp; 
            Noenk <a href="https://wa.me/628123491222" target="_blank" class="wa-link">08123491222</a>
        </div>

        <div class="info-box">
            <div style="font-size: 15px;">
                Total Alumni Hadir: <strong id="total-peserta" style="font-size: 20px; color: #2980b9;">0</strong> orang
            </div>
        </div>

        <table id="tabel-peserta">
            <thead>
                <tr>
                    <th style="width: 40px; text-align: center;">No.</th>
                    <th>Nama Alumni</th>
                    <th class="text-center">Ukuran</th>
                    <th class="text-center">Lengan</th>
                    <th class="text-center">Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="5" class="text-center">Memuat data dari server...</td></tr>
            </tbody>
        </table>

        <div class="rekap-kaos" id="tempat-rekap">
            Memuat rekapitulasi pesanan kaos...
        </div>
    </div>

    <script>
        // URL API Anda
        const apiUrl = 'https://script.google.com/macros/s/AKfycbzYuOivloA5-WfWmofs3hdAEtDom-Q2VmW7VMfqF5LgaNgmrmfNVRV06NSIl8ieg583/exec';

        // Fungsi Load Data
        function muatData() {
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.querySelector('#tabel-peserta tbody');
                    tbody.innerHTML = ''; 
                    document.getElementById('total-peserta').innerText = data.length;

                    // Mengurutkan data berdasarkan Abjad Nama (A-Z)
                    data.sort((a, b) => a.nama.localeCompare(b.nama, 'id', {sensitivity: 'base'}));

                    let rekapKaos = {};

                    data.forEach((peserta, index) => {
                        // Agar tanda kutip di nama tidak membuat error saat di-klik
                        let safeName = peserta.nama.replace(/'/g, "\\'"); 

                        const row = `<tr>
                            <td class="text-center"><strong>${index + 1}</strong></td>
                            <td><strong>${peserta.nama}</strong></td>
                            <td class="text-center">${peserta.ukuran}</td>
                            <td class="text-center">${peserta.lengan}</td>
                            <td class="text-center">
                                <button class="btn-delete" onclick="hapusData('${safeName}')">Hapus</button>
                            </td>
                        </tr>`;
                        tbody.innerHTML += row;

                        // Perhitungan Rekap Kaos
                        let uk = String(peserta.ukuran).trim().toUpperCase();
                        let len = String(peserta.lengan).trim().toLowerCase();
                        let lenStr = len.includes('panjang') ? 'Panjang' : 'Pendek';

                        if (uk !== "" && uk !== "UNDEFINED" && uk !== "-") {
                            let kunciKombinasi = uk + ' ' + lenStr; 
                            if (rekapKaos[kunciKombinasi] === undefined) {
                                rekapKaos[kunciKombinasi] = 0;
                            }
                            rekapKaos[kunciKombinasi]++;
                        }
                    });

                    // Cetak Rekap Kaos di Bawah
                    let rekapHtml = '<div class="rekap-title">Rekap Pesanan Kaos:</div><div class="rekap-grid">';
                    let adaData = false;
                    let kunciUrut = Object.keys(rekapKaos).sort();

                    kunciUrut.forEach(kunci => {
                        if (rekapKaos[kunci] > 0) {
                            rekapHtml += `<div class="rekap-item">${kunci} = <strong>${rekapKaos[kunci]}</strong></div>`;
                            adaData = true;
                        }
                    });

                    if (!adaData) {
                        rekapHtml += '<div style="color: #7f8c8d; font-size: 13px;">Belum ada pesanan kaos.</div>';
                    }
                    rekapHtml += '</div>';
                    document.getElementById('tempat-rekap').innerHTML = rekapHtml;
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.querySelector('#tabel-peserta tbody').innerHTML = '<tr><td colspan="5" class="text-center" style="color:red;">Gagal memuat data.</td></tr>';
                });
        }

        // Fungsi Hapus Data
        function hapusData(nama) {
            let pass = prompt(`Masukkan password admin untuk menghapus nama "${nama}":`);
            
            // Jika user klik cancel atau membiarkan kosong
            if (!pass) return; 

            if (confirm(`Anda yakin ingin menghapus data ${nama} secara permanen?`)) {
                // Tampilkan indikator loading di tombol atau layar bisa ditambahkan di sini
                let deleteUrl = apiUrl + '?action=delete&nama=' + encodeURIComponent(nama) + '&pass=' + encodeURIComponent(pass);
                
                fetch(deleteUrl)
                    .then(response => response.json())
                    .then(res => {
                        if (res.status === 'success') {
                            alert("Data berhasil dihapus!");
                            muatData(); // Refresh tabel tanpa perlu refresh halaman web
                        } else {
                            alert("GAGAL: " + res.message);
                        }
                    })
                    .catch(error => {
                        alert("Terjadi kesalahan sistem/jaringan.");
                    });
            }
        }

        // Panggil fungsi saat web dibuka
        muatData();
    </script>
</body>
</html>
