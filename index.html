<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Hadir & Distribusi Kaos Reuni</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 700px; margin: auto; background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-container { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; gap: 15px; }
        .logo { width: 70px; height: auto; object-fit: contain; }
        .header-text { text-align: left; }
        .header-text h2 { color: #2c3e50; margin: 0 0 5px 0; font-size: 22px; }
        .header-text .subtitle { color: #7f8c8d; margin: 0; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 10px; text-align: left; }
        th { background-color: #3498db; color: white; border-bottom: none; }
        tr:hover { background-color: #f9f9f9; }
        .text-center { text-align: center; }
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }

        .rekap-kaos { background-color: white; padding: 15px; border-radius: 6px; margin-top: 30px; border: 1px solid #bce8f1; color: #2c3e50; }
        .rekap-item { background-color: #ecf0f1; padding: 6px 12px; border-radius: 6px; font-size: 13px; display: inline-block; margin: 5px; }
        .rekap-item strong { color: #e74c3c; font-size: 15px; margin-left: 5px; }

        /* GAYA PANEL LOGISTIK */
        .btn-logistik { background-color: #f39c12; color: white; border: none; padding: 10px 15px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 20px;}
        .panel-logistik { background-color: #fff8e1; border: 2px dashed #f39c12; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-kamera { background-color: #27ae60; color: white; padding: 10px; border: none; border-radius: 6px; width: 100%; font-size: 16px; cursor: pointer; font-weight: bold;}
        .btn-kamera:disabled { background-color: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-container">
            <img src="logo.jpg" alt="Logo Reuni" class="logo">
            <div class="header-text">
                <h2>Distribusi Kaos Reuni</h2>
                <h2>SMPN 1 Banyuwangi</h2>
                <p class="subtitle">Kecaruk Riko Maning Dulur</p>
            </div>
        </div>

        <button class="btn-logistik" onclick="toggleLogistik()">📦 Buka Panel Logistik (Khusus Panitia)</button>

        <div class="panel-logistik" id="box-logistik">
            <h3 style="margin-top:0; color:#d35400;">Area Pengambilan Kaos</h3>
            
            <div class="form-group">
                <label>Nama Pengambil:</label>
                <select class="form-control" id="input-nama">
                    <option value="">-- Pilih Nama Alumni --</option>
                    </select>
            </div>

            <div class="form-group">
                <label>PIN Admin:</label>
                <input type="password" class="form-control" id="input-pin" placeholder="Masukkan PIN 6 digit">
            </div>

            <div class="form-group">
                <label>Ambil Foto Bukti:</label>
                <input type="file" class="form-control" id="input-foto" accept="image/*" capture="camera" style="background: white;">
            </div>

            <button class="btn-kamera" id="btn-simpan" onclick="simpanPengambilan()">📸 Upload & Simpan Data</button>
            <p id="status-upload" style="text-align: center; font-weight: bold; color: #2980b9;"></p>
        </div>

        <table id="tabel-peserta">
            <thead>
                <tr>
                    <th style="width: 40px; text-align: center;">No.</th>
                    <th>Nama Alumni</th>
                    <th class="text-center">Ukuran</th>
                    <th class="text-center">Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="4" class="text-center">Memuat data dari server...</td></tr>
            </tbody>
        </table>

        <div class="rekap-kaos" id="tempat-rekap">Memuat rekapitulasi pesanan kaos...</div>
    </div>

    <script>
        // PASTIKAN URL API ANDA MASIH BENAR DI SINI
        const apiUrl = 'https://script.google.com/macros/s/AKfycbzYuOivloA5-WfWmofs3hdAEtDom-Q2VmW7VMfqF5LgaNgmrmfNVRV06NSIl8ieg583/exec';

        // Tampilkan/Sembunyikan Panel Logistik
        function toggleLogistik() {
            const panel = document.getElementById('box-logistik');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        // Muat Data Tabel & Dropdown
        function muatData() {
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.querySelector('#tabel-peserta tbody');
                    const dropdownNama = document.getElementById('input-nama');
                    
                    tbody.innerHTML = ''; 
                    dropdownNama.innerHTML = '<option value="">-- Pilih Nama Alumni --</option>'; // Reset dropdown

                    data.sort((a, b) => a.nama.localeCompare(b.nama, 'id', {sensitivity: 'base'}));
                    let rekapKaos = {};

                    data.forEach((peserta, index) => {
                        let safeName = peserta.nama.replace(/'/g, "\\'"); 
                        
                        // Cetak ke Tabel
                        tbody.innerHTML += `<tr>
                            <td class="text-center"><strong>${index + 1}</strong></td>
                            <td><strong>${peserta.nama}</strong></td>
                            <td class="text-center">${peserta.ukuran}</td>
                            <td class="text-center"><button class="btn-delete" onclick="hapusData('${safeName}')">Hapus</button></td>
                        </tr>`;

                        // Masukkan nama ke dalam Dropdown Logistik
                        dropdownNama.innerHTML += `<option value="${peserta.nama}">${peserta.nama} (${peserta.ukuran})</option>`;

                        // Hitung Rekap
                        let uk = String(peserta.ukuran).trim().toUpperCase();
                        let lenStr = String(peserta.lengan).toLowerCase().includes('panjang') ? 'Panjang' : 'Pendek';
                        if (uk !== "" && uk !== "UNDEFINED" && uk !== "-") {
                            let kunciKombinasi = uk + ' ' + lenStr; 
                            if (rekapKaos[kunciKombinasi] === undefined) rekapKaos[kunciKombinasi] = 0;
                            rekapKaos[kunciKombinasi]++;
                        }
                    });

                    // Cetak Rekap
                    let rekapHtml = '<div style="font-weight: bold; margin-bottom: 10px;">Total Pesanan Kaos (Keseluruhan):</div>';
                    Object.keys(rekapKaos).sort().forEach(kunci => {
                        rekapHtml += `<div class="rekap-item">${kunci} = <strong>${rekapKaos[kunci]}</strong></div>`;
                    });
                    document.getElementById('tempat-rekap').innerHTML = rekapHtml;
                })
                .catch(error => console.error('Error:', error));
        }

        // Proses Eksekusi Kamera & Kirim Data
        function simpanPengambilan() {
            const nama = document.getElementById('input-nama').value;
            const pin = document.getElementById('input-pin').value;
            const fotoInput = document.getElementById('input-foto');
            const statusText = document.getElementById('status-upload');
            const btnSimpan = document.getElementById('btn-simpan');

            if (!nama || !pin || fotoInput.files.length === 0) {
                alert("Harap pilih nama, masukkan PIN, dan ambil foto bukti!");
                return;
            }

            statusText.innerText = "⏳ Sedang mengunggah foto ke Google Drive... Mohon tunggu.";
            btnSimpan.disabled = true;

            const file = fotoInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const base64String = e.target.result;

                // Kirim data ke API menggunakan metode POST
                fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Format aman untuk Apps Script
                    body: JSON.stringify({
                        action: "upload",
                        pin: pin,
                        nama: nama,
                        file: base64String,
                        mimeType: file.type
                    })
                })
                .then(response => response.json())
                .then(res => {
                    if (res.status === 'success') {
                        statusText.innerText = "✅ Berhasil! Data dan foto telah tersimpan.";
                        alert(`Pengambilan kaos atas nama ${nama} berhasil dicatat!`);
                        
                        // Bersihkan form
                        document.getElementById('input-nama').value = '';
                        document.getElementById('input-pin').value = '';
                        document.getElementById('input-foto').value = '';
                    } else {
                        statusText.innerText = "❌ Gagal: " + res.message;
                    }
                })
                .catch(err => {
                    statusText.innerText = "❌ Gagal mengunggah karena gangguan jaringan.";
                })
                .finally(() => {
                    btnSimpan.disabled = false;
                });
            };
            
            reader.readAsDataURL(file); // Mulai ubah foto ke format teks base64
        }

        function hapusData(nama) {
            let pass = prompt(`Password admin hapus data "${nama}":`);
            if (!pass) return; 
            if (confirm(`Hapus data ${nama}?`)) {
                fetch(apiUrl + '?action=delete&nama=' + encodeURIComponent(nama) + '&pass=' + encodeURIComponent(pass))
                    .then(res => res.json())
                    .then(res => { res.status === 'success' ? muatData() : alert("GAGAL: " + res.message); });
            }
        }

        muatData();
    </script>
</body>
</html>
